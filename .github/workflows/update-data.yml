name: Refresh data & publish site

# Most BWF tournaments end on Sunday and Wikipedia editors fill in results
# within a day, so Monday catches a finished event plus the next draw. The
# other days matter because a live tournament's predictions should move as
# its rounds complete - the incremental scrape and export both no-op cheaply
# when nothing has changed, so a daily run costs little.
on:
  schedule:
    # Full run: scrape, re-engineer features, re-select and retrain the
    # promoted model.
    - cron: "0 6 * * *"
    # Light runs, every three hours otherwise. A live tournament's results
    # reach the site within a few hours of Wikipedia carrying them; these skip
    # the retrain, which cannot affect a live draw anyway - its point-in-time
    # model is fit strictly before the tournament started. What they do refresh
    # is which matches have been
    # played - and therefore both the results-conditioned championship odds and
    # the later-round predictions, whose Elo and form now carry the tournament's
    # own completed rounds (see order_by_round / row_player_state).
    - cron: "0 0,3,9,12,15,18,21 * * *"
  workflow_dispatch: {}
  # Anything the exported payload depends on republishes without waiting for
  # the schedule: the frontend, the code that builds it, the data it is built
  # from, and the model that makes the calls.
  push:
    branches: [main]
    paths:
      - "site/**"
      - "src/**"
      - "data/**"
      - "models/**"
      - ".github/workflows/update-data.yml"

permissions:
  contents: write
  pages: write
  id-token: write

# Never let two runs deploy Pages at once; let an in-flight run finish so a
# push mid-refresh doesn't abandon a half-committed dataset.
concurrency:
  group: deuce-publish
  cancel-in-progress: false

jobs:
  refresh:
    name: Scrape & retrain
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # A retrain is worth it once a day; the 3-hourly runs exist only to pick
      # up results. Manual dispatches are treated as full runs.
      - name: Decide run depth
        id: depth
        run: |
          if [ "${{ github.event.schedule }}" = "0 0,3,9,12,15,18,21 * * *" ]; then
            echo "full=false" >> "$GITHUB_OUTPUT"
            echo "Light run: scrape and republish, no retrain."
          else
            echo "full=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install ".[dev]"

      - name: Rebuild tournament calendar
        run: python src/pipeline/build_config.py

      - name: Incremental scrape (new / pending / recent tournaments)
        run: python src/pipeline/scraper_orchestrator.py --incremental

      - name: Sanity-check scraped data
        run: python src/pipeline/data_checks.py

      # Only the tests that read the raw scrape - the dataset the rest of the
      # suite needs has not been rebuilt yet at this point. The full suite runs
      # in `publish`, against the payload that is actually about to ship.
      - name: Test scraped names
        run: pytest -q tests/test_names.py

      - name: Detect data changes
        id: diff
        run: |
          if git diff --quiet -- data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes - skipping feature engineering and retrain."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-engineer features + mirror dataset
        if: steps.diff.outputs.changed == 'true' && steps.depth.outputs.full == 'true'
        run: |
          python src/pipeline/feature_engineering.py
          python src/pipeline/data_loader.py

      - name: Select & retrain production model (best of xgb/lgbm/catboost)
        if: steps.diff.outputs.changed == 'true' && steps.depth.outputs.full == 'true'
        run: python src/modeling/promote.py

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/config data/raw models/best_model.pkl
          git commit -m "Auto-refresh: new tournament data + retrained model ($(date -u +%F))"
          git push

  publish:
    name: Export & deploy to Pages
    needs: [refresh]
    # Runs whether or not `refresh` ran: a push skips it entirely, and a
    # scheduled run with no new data still needs the site to exist. Naming the
    # two results that should publish, rather than excluding `failure`, is
    # deliberate - a job GitHub never managed to hand a runner to ends up
    # `cancelled`, which slipped through the old `!= 'failure'` test and
    # redeployed an unchanged payload off the back of a scrape that never ran.
    if: always() && (needs.refresh.result == 'success' || needs.refresh.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      # Take main's tip rather than the triggering SHA, so we pick up the
      # auto-refresh commit the job above may have just pushed.
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install ".[dev]"

      # The engineered and mirrored datasets are derived from data/raw, so they
      # are not tracked. Rebuilding them here (~30s) also guarantees the site is
      # exported from the same raw data the repo actually holds.
      - name: Rebuild derived dataset
        run: |
          python src/pipeline/feature_engineering.py
          python src/pipeline/data_loader.py

      # Restoring the previous payload is what makes this cheap: the exporter
      # fingerprints each tournament's inputs and rewrites only what moved.
      # A full build is ~20 min, an unchanged rerun seconds.
      - name: Restore previous export
        uses: actions/cache/restore@v4
        with:
          path: site/data
          key: export-${{ github.run_id }}
          restore-keys: export-

      - name: Export static payload
        run: python src/serving/export_static.py

      # After the export so the payload tests see the files about to ship, and
      # before the gate so a failure stops the deploy.
      - name: Tests
        run: pytest -q

      - name: Publish gate
        run: python src/serving/check_export.py site/data

      - name: Save export for the next run
        uses: actions/cache/save@v4
        with:
          path: site/data
          key: export-${{ github.run_id }}

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
