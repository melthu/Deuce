<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deuce</title>
<meta name="description" content="Point-in-time match predictions, bracket simulations and model explanations for BWF World Tour men's singles.">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏸</text></svg>">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-txt">
        <h1><i class="shuttle" aria-hidden="true"></i>Deuce</h1>
        <p>BWF World Tour Men's Singles Prediction Model</p>
      </div>
      <button type="button" id="navtoggle" class="navtoggle"
              aria-label="Collapse tournament list" title="Collapse">‹</button>
    </div>

    <nav class="nav">
      <button type="button" data-view="tournaments" aria-selected="true">Tournaments</button>
      <button type="button" data-view="matchup" aria-selected="false">Matchup</button>
    </nav>

    <div id="browse">
      <div class="filters">
        <div class="dd" id="seasonDd">
          <button type="button" class="dd-btn" id="seasonBtn"
                  aria-haspopup="listbox" aria-expanded="false" aria-label="Season">
            <span id="seasonLabel">All seasons</span>
            <span class="dd-caret" aria-hidden="true">▾</span>
          </button>
          <div class="dd-menu" id="seasonMenu" role="listbox" tabindex="-1" hidden></div>
        </div>
      </div>
      <div class="filters" style="padding-top:0">
        <input type="search" id="tsearch" placeholder="Search tournaments…" aria-label="Search tournaments">
      </div>
      <div class="tlist" id="tlist"></div>
    </div>

    <div id="ratings" hidden>
      <div class="filters" style="padding-bottom:4px">
        <span class="pill">Rating leaders</span>
      </div>
      <div class="tlist" id="rlist"></div>
    </div>
  </aside>

  <button type="button" id="theme" class="themebtn" title="Toggle light / dark"
          aria-label="Toggle light or dark theme"></button>

  <main class="main" id="main">
    <div class="empty">Loading…</div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
